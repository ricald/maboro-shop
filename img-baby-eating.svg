<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#fffde7"/>
      <stop offset="100%" stop-color="#fff8e8"/>
    </radialGradient>
  </defs>

  <rect width="400" height="320" rx="24" fill="url(#bg2)"/>

  <!-- 床 -->
  <ellipse cx="200" cy="295" rx="160" ry="18" fill="#ffe0b2" opacity=".5"/>

  <!-- ベビーチェア脚 -->
  <rect x="138" y="235" width="14" height="70" rx="7" fill="#d4a96a"/>
  <rect x="248" y="235" width="14" height="70" rx="7" fill="#d4a96a"/>
  <rect x="120" y="270" width="160" height="12" rx="6" fill="#c8973a"/>

  <!-- ベビーチェア トレイ -->
  <rect x="110" y="200" width="180" height="45" rx="14" fill="#ffd180"/>
  <rect x="118" y="208" width="164" height="30" rx="10" fill="#ffe0a0"/>

  <!-- トレイ上のボーロたち -->
  <circle cx="155" cy="222" r="11" fill="#fff8e1" stroke="#ffd54f" stroke-width="2"/>
  <circle cx="155" cy="222" r="6" fill="#fffde7"/>
  <circle cx="185" cy="220" r="13" fill="#fff8e1" stroke="#ffd54f" stroke-width="2"/>
  <circle cx="185" cy="220" r="7" fill="#fffde7"/>
  <circle cx="218" cy="222" r="11" fill="#fff8e1" stroke="#ffd54f" stroke-width="2"/>
  <circle cx="218" cy="222" r="6" fill="#fffde7"/>
  <circle cx="248" cy="221" r="12" fill="#fff8e1" stroke="#ffd54f" stroke-width="2"/>
  <circle cx="248" cy="221" r="7" fill="#fffde7"/>

  <!-- 赤ちゃんの体 -->
  <ellipse cx="200" cy="235" rx="52" ry="45" fill="#ffcc80"/>
  <!-- ロンパース -->
  <ellipse cx="200" cy="250" rx="50" ry="38" fill="#ff9ab5"/>
  <!-- ロンパース ボタン -->
  <circle cx="200" cy="248" r="4" fill="#fff" opacity=".8"/>
  <circle cx="200" cy="262" r="4" fill="#fff" opacity=".8"/>

  <!-- 腕（左）トレイに向けて -->
  <ellipse cx="145" cy="222" rx="16" ry="24" fill="#ffcc80" transform="rotate(25 145 222)"/>
  <!-- 手（左）ボーロつかんでる -->
  <circle cx="134" cy="210" r="13" fill="#ffcc80"/>
  <circle cx="127" cy="204" r="5" fill="#ffb8a0"/>
  <circle cx="136" cy="200" r="5" fill="#ffb8a0"/>
  <circle cx="145" cy="202" r="5" fill="#ffb8a0"/>
  <!-- ボーロ -->
  <circle cx="131" cy="197" r="8" fill="#fff8e1" stroke="#ffd54f" stroke-width="1.5"/>
  <circle cx="131" cy="197" r="5" fill="#fffde7"/>

  <!-- 腕（右）口に向けて -->
  <ellipse cx="256" cy="200" rx="16" ry="24" fill="#ffcc80" transform="rotate(-30 256 200)"/>
  <!-- 手（右） -->
  <circle cx="268" cy="188" r="13" fill="#ffcc80"/>

  <!-- 赤ちゃんの頭 -->
  <circle cx="200" cy="160" r="60" fill="#ffcc80"/>
  <!-- ほわほわ髪 -->
  <ellipse cx="200" cy="108" rx="28" ry="14" fill="#8d6e63" opacity=".9"/>
  <circle cx="176" cy="112" r="12" fill="#8d6e63" opacity=".9"/>
  <circle cx="200" cy="106" r="14" fill="#8d6e63" opacity=".9"/>
  <circle cx="224" cy="112" r="12" fill="#8d6e63" opacity=".9"/>
  <!-- 目（まんまる笑顔） -->
  <circle cx="180" cy="158" r="11" fill="#fff"/>
  <circle cx="220" cy="158" r="11" fill="#fff"/>
  <circle cx="183" cy="160" r="7" fill="#5d3a1a"/>
  <circle cx="223" cy="160" r="7" fill="#5d3a1a"/>
  <circle cx="185" cy="157" r="3" fill="#fff"/>
  <circle cx="225" cy="157" r="3" fill="#fff"/>
  <!-- まつげ -->
  <line x1="174" y1="149" x2="172" y2="144" stroke="#5d3a1a" stroke-width="1.5"/>
  <line x1="180" y1="147" x2="180" y2="142" stroke="#5d3a1a" stroke-width="1.5"/>
  <line x1="186" y1="149" x2="188" y2="144" stroke="#5d3a1a" stroke-width="1.5"/>
  <line x1="214" y1="149" x2="212" y2="144" stroke="#5d3a1a" stroke-width="1.5"/>
  <line x1="220" y1="147" x2="220" y2="142" stroke="#5d3a1a" stroke-width="1.5"/>
  <line x1="226" y1="149" x2="228" y2="144" stroke="#5d3a1a" stroke-width="1.5"/>
  <!-- 鼻 -->
  <ellipse cx="200" cy="172" rx="5" ry="4" fill="#e0a88a"/>
  <!-- 口（おいしそう！） -->
  <path d="M186 183 Q200 196 214 183" stroke="#c07060" stroke-width="2.5" fill="#ffb3a0" stroke-linecap="round"/>
  <!-- ほっぺ -->
  <ellipse cx="162" cy="172" rx="16" ry="11" fill="#ffb3c6" opacity=".65"/>
  <ellipse cx="238" cy="172" rx="16" ry="11" fill="#ffb3c6" opacity=".65"/>
  <!-- よだれかけ -->
  <path d="M165 195 Q200 215 235 195 Q230 225 200 230 Q170 225 165 195Z" fill="#fff" opacity=".85"/>
  <text x="200" y="220" font-size="9" text-anchor="middle" fill="#ffb3c6" font-family="sans-serif" font-weight="bold">まーぼうろ♡</text>

  <!-- きらきら効果 -->
  <text x="90" y="130" font-size="22" opacity=".7">✨</text>
  <text x="295" y="120" font-size="18" opacity=".6">⭐</text>
  <text x="68" y="170" font-size="16" opacity=".5">💕</text>
  <text x="314" y="175" font-size="16" opacity=".5">🌟</text>

  <!-- テキスト -->
  <text x="200" y="308" font-size="15" text-anchor="middle" fill="#c0607a" font-family="sans-serif" font-weight="bold">おいし〜！もっとちょうだい♪</text>
</svg>
